<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CP Message Dialog</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      padding: 40px 15px;
      background: #f0f0f0;
    }

    h1 {
      font-size: 22px;
    }

    .open-btn {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      width: 80%;
      max-width: 300px;
    }

    /* overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      padding: 20px;
    }

    /* dialog */
    .dialog {
      background: white;
      width: 90%;
      max-width: 350px;
      margin: 25% auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }

    #messageText {
      font-size: 18px;
      margin: 15px 0;
    }

    .btn {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
    }

    .next-btn {
      background: #2196F3;
      color: white;
    }

    .close-btn {
      background: red;
      color: white;
    }
  </style>
</head>

<body>

<h1> Open me :> </h1> 
<footer>
<p> 2026 All rights reserved. Developed by Jhon Toledo </p>
</footer>

<button class="open-btn" onclick="openDialog()">Click Me</button>

<div class="overlay" id="overlay">
  <div class="dialog">

    <h2>Message</h2>
    <div id="messageText">HI PAHINIH GRASYA MEOW 😂</div>

    <button class="btn next-btn" onclick="nextMessage()">Next</button>
    <button class="btn close-btn" onclick="closeDialog()">Close</button>

  </div>
</div>

<script>
let messages = [
  "HI PAHINGI GRASYA MEOW 😂",
  "JOKE LANG  😆",
  "MABAIT AKO BLEEE 😇",
  "BYE NA NGA MOEW 😺",
];

let index = 0;

function openDialog() {
  index = 0;
  document.getElementById("messageText").innerText = messages[index];
  document.getElementById("overlay").style.display = "block";
}

function nextMessage() {
  index++;
  if (index >= messages.length) {
    index = 0;
  }
  document.getElementById("messageText").innerText = messages[index];
}

function closeDialog() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>
